<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Tech Company</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      text-align: center;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    #mainImage img {
      border-radius: 8px;
    }

    #description {
      margin: 20px auto;
      max-width: 600px;
    }

    #slider img {
      border: 2px solid #333;
      border-radius: 5px;
    }

    #cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 30px 0;
      flex-wrap: wrap;
    }

    .card {
      border: 1px solid #ccc;
      padding: 15px;
      width: 200px;
      border-radius: 8px;
      background: #f9f9f9;
    }

    #auth {
      margin-top: 40px;
    }

    #auth form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 300px;
      margin: 0 auto;
    }

    #auth input, #auth button {
      padding: 10px;
      font-size: 14px;
    }

    /* Responsive tweak */
    @media (max-width: 600px) {
      #cards {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <!-- Company Header -->
  <header id="header">
    <img src="logo.jpeg" alt="Company Logo" width="80">
    <h1>My Tech Company</h1>
  </header>

  <!-- Main Image -->
  <div id="mainImage">
    <img src="img2.jpeg" alt="Main company image" width="500">
  </div>

  <!-- Paragraph -->
  <p id="description">
    Welcome to our company website. We provide innovative technology solutions.
  </p>

  <!-- Image Slider -->
  <div id="slider">
    <img id="slideImg" src="img1.jpg" alt="Slider image" width="400">
  </div>

  <!-- Company Cards -->
  <div id="cards">
    <div class="card">
      <h3>Service 1</h3>
      <p>Description of service 1</p>
    </div>
    <div class="card">
      <h3>Service 2</h3>
      <p>Description of service 2</p>
    </div>
    <div class="card">
      <h3>Service 3</h3>
      <p>Description of service 3</p>
    </div>
  </div>

  <!-- Login / Signin -->
  <div id="auth">
    <h2>Login</h2>
    <form>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Sign In</button>
    </form>
  </div>

  <script>
    const images = [
      "img1.jpeg",
      "img2.jpeg",
      "img3.jpeg",
      "img4.jpeg",
      "img5.jpeg",
      "img6.jpeg",
      "img7.jpeg"
    ];

    let index = 0;
    const slideImg = document.getElementById("slideImg");

    function changeSlide() {
      slideImg.src = images[index];
      index = (index + 1) % images.length;
    }

    setInterval(changeSlide, 2000);
  </script>
</body>
</html>
